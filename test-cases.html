function escHtml(v) {
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function areaTag(area) {
  return `<span class="area-tag area-${areaColors[area]||'blue'}">${escHtml(area)}<\/span>`;
}

function scenarioTag(type) {
  const className = type === 'Positive' ? 'scenario-pos' : type === 'Negative' ? 'scenario-neg' : 'scenario-mixed';
  return `<span class="scenario-tag ${className}">${escHtml(type)}<\/span>`;
}

function fieldTag(tag) {
  return `<span class="field-tag">${escHtml(tag)}<\/span>`;
}

/* ── Category checkbox multi-select ─────────────────────────── */
let selectedAreas = new Set();

function buildAreaDropdown() {
  const counts = {};
  cases.forEach(tc => { counts[tc.area] = (counts[tc.area]||0)+1; });
  const list = document.getElementById('cat-list');
  Object.keys(counts).sort().forEach(area => {
    const lbl = document.createElement('label');
    lbl.className = 'cat-option';
    lbl.innerHTML = `
      <input type="checkbox" value="${escHtml(area)}" onchange="onCatChange(this)">
      <span class="cat-check"><\/span>
      <span class="cat-name">${escHtml(area)}<\/span>
      <span class="cat-count">${counts[area]}<\/span>`;
    list.appendChild(lbl);
  });
}

function toggleCatMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('cat-menu');
  const arrow = document.getElementById('cat-arrow');
  const open = menu.classList.toggle('open');
  arrow.textContent = open ? '▴' : '▾';
  if (open) {
    document.getElementById('tag-menu').classList.remove('open');
    document.getElementById('tag-arrow').textContent = '▾';
  }
}

document.addEventListener('click', function(e) {
  const catWrap = document.getElementById('cat-filter-wrap');
  if (catWrap && !catWrap.contains(e.target)) {
    document.getElementById('cat-menu').classList.remove('open');
    document.getElementById('cat-arrow').textContent = '▾';
  }
  const tagWrap = document.getElementById('tag-filter-wrap');
  if (tagWrap && !tagWrap.contains(e.target)) {
    document.getElementById('tag-menu').classList.remove('open');
    document.getElementById('tag-arrow').textContent = '▾';
  }
});

function setCatAll(cb) {
  if (cb.checked) {
    selectedAreas.clear();
    document.querySelectorAll('#cat-list input[type=checkbox]').forEach(c => c.checked = false);
    updateCatLabel();
    renderList();
  } else {
    cb.checked = true;
  }
}

function onCatChange(cb) {
  const allCb = document.getElementById('cat-all');
  if (cb.checked) {
    selectedAreas.add(cb.value);
    allCb.checked = false;
  } else {
    selectedAreas.delete(cb.value);
    if (selectedAreas.size === 0) allCb.checked = true;
  }
  updateCatLabel();
  renderList();
}

function updateCatLabel() {
  const lbl = document.getElementById('cat-filter-label');
  if (selectedAreas.size === 0) {
    lbl.textContent = 'ALL CATEGORIES';
  } else if (selectedAreas.size === 1) {
    lbl.textContent = [...selectedAreas][0].toUpperCase();
  } else {
    lbl.textContent = selectedAreas.size + ' CATEGORIES';
  }
}

/* ── Tag checkbox multi-select ─────────────────────────── */
let selectedTags = new Set();

function buildTagDropdown() {
  const tagCounts = {};
  cases.forEach(tc => {
    (tc.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t]||0)+1; });
  });
  const list = document.getElementById('tag-list');
  Object.keys(tagCounts).sort().forEach(tag => {
    const lbl = document.createElement('label');
    lbl.className = 'cat-option';
    lbl.innerHTML = `
      <input type="checkbox" value="${escHtml(tag)}" onchange="onTagChange(this)">
      <span class="cat-check"><\/span>
      <span class="cat-name">${escHtml(tag)}<\/span>
      <span class="cat-count">${tagCounts[tag]}<\/span>`;
    list.appendChild(lbl);
  });
}

function toggleTagMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('tag-menu');
  const arrow = document.getElementById('tag-arrow');
  const open = menu.classList.toggle('open');
  arrow.textContent = open ? '▴' : '▾';
  if (open) {
    document.getElementById('cat-menu').classList.remove('open');
    document.getElementById('cat-arrow').textContent = '▾';
  }
}

function setTagAll(cb) {
  if (cb.checked) {
    selectedTags.clear();
    document.querySelectorAll('#tag-list input[type=checkbox]').forEach(c => c.checked = false);
    updateTagLabel();
    renderList();
  } else {
    cb.checked = true;
  }
}

function onTagChange(cb) {
  const allCb = document.getElementById('tag-all');
  if (cb.checked) {
    selectedTags.add(cb.value);
    allCb.checked = false;
  } else {
    selectedTags.delete(cb.value);
    if (selectedTags.size === 0) allCb.checked = true;
  }
  updateTagLabel();
  renderList();
}

function updateTagLabel() {
  const lbl = document.getElementById('tag-filter-label');
  if (selectedTags.size === 0) {
    lbl.textContent = 'ALL TAGS';
  } else if (selectedTags.size === 1) {
    lbl.textContent = [...selectedTags][0].toUpperCase();
  } else {
    lbl.textContent = selectedTags.size + ' TAGS';
  }
}

function applyFilters() {
  renderList();
}

function setScenario(type, button) {
  activeScenario = type;
  document.querySelectorAll('.scenario-btn').forEach(item => item.classList.remove('active'));
  button.classList.add('active');
  renderList();
}

function renderList() {
  let filtered = cases;
  if (selectedAreas.size > 0) filtered = filtered.filter(tc => selectedAreas.has(tc.area));
  if (selectedTags.size > 0) filtered = filtered.filter(tc =>
    (tc.tags || []).some(t => selectedTags.has(t))
  );
  if (activeScenario !== 'all') filtered = filtered.filter(tc => tc.type === activeScenario);
  document.getElementById('count-label').textContent = filtered.length + ' / ' + cases.length;
  let lastArea = '';
  const html = filtered.map(tc => {
    const heading = tc.area !== lastArea ? `<div class="list-cat-label">${escHtml(tc.area)}<\/div>` : '';
    lastArea = tc.area;
    return `${heading}<article class="tc-item${activeCase===tc.id?' active':''}" id="item-${tc.id}" onclick="openDetail('${tc.id}')">
      <div class="tc-item-row1">
        <span class="tc-item-id">${tc.id}<\/span>
        <span class="tc-item-title">${escHtml(tc.title)}<\/span>
      <\/div>
      <div class="tc-item-badges">${areaTag(tc.area)}${scenarioTag(tc.type)}<\/div>
    <\/article>`;
  }).join('');
  document.getElementById('list-scroll').innerHTML = html || '<div class="empty-filter">NO CASES MATCH FILTER<\/div>';
}

function stepList(items, cssClass) {
  const isExpected = cssClass === 'detail-results';
  const isSteps    = cssClass === 'detail-steps';
  return `<ol class="${cssClass}">${items.map((item, i) => {
    const mark = isExpected ? '' : isSteps ? (i + 1) : '';
    return `<li class="detail-step"><span class="step-mark" aria-hidden="true">${mark}<\/span><span class="step-text">${escHtml(item)}<\/span><\/li>`;
  }).join('')}<\/ol>`;
}

function openDetail(id) {
  const tc = cases.find(c => c.id === id);
  if (!tc) return;
  activeCase = id;
  renderList();
  const el = document.getElementById('item-'+id);
  if (el) el.scrollIntoView({block:'nearest'});

  document.getElementById('detail-empty').style.display = 'none';
  const panel = document.getElementById('detail-content');
  panel.style.display = 'block';

  const notesHtml = tc.notes ? `
    <section class="meta-block">
      <div class="meta-label">Notes<\/div>
      <div class="meta-text">${escHtml(tc.notes)}<\/div>
    <\/section>` : '';

  const tagsHtml = (tc.tags && tc.tags.length) ? `
    <section class="meta-block">
      <div class="meta-label">Fields<\/div>
      <div class="meta-tags">${tc.tags.map(fieldTag).join('')}<\/div>
    <\/section>` : '';

  panel.innerHTML = `
    <header class="case-header">
      <div class="detail-tc-meta"><span class="detail-tc-id">${tc.id}<\/span><\/div>
      <h1 class="detail-title">${escHtml(tc.title)}<\/h1>
    <\/header>
    <nav class="case-tabs" aria-label="Case sections"><span class="active">Overview<\/span><\/nav>
    <div class="case-grid">
      <div class="case-main">
        <section class="case-section">
          <h2>Test Data<\/h2>
          <div class="detail-variation">${escHtml(tc.testData)}<\/div>
        <\/section>
        <section class="case-section">
          <h2>Preconditions<\/h2>
          ${stepList(tc.preconditions, 'detail-preconditions-list')}
        <\/section>
        <section class="case-section">
          <h2>Steps<\/h2>
          ${stepList(tc.steps, 'detail-steps')}
        <\/section>
        <section class="case-section expected-section">
          <h2>Expected Result<\/h2>
          ${stepList(tc.expected, 'detail-results')}
        <\/section>
      <\/div>
      <aside class="case-aside">
        <section class="meta-block"><div class="meta-label">Category<\/div>${areaTag(tc.area)}<\/section>
        <section class="meta-block"><div class="meta-label">Positive \/ Negative<\/div>${scenarioTag(tc.type)}<\/section>
        ${tagsHtml}
        ${notesHtml}
      <\/aside>
    <\/div>`;
}

/* Re-trigger slide-in animation each time a case is opened */
const _origOpen = openDetail;
window.openDetail = function(id) {
  _origOpen(id);
  const panel = document.getElementById('detail-content');
  if (panel) {
    panel.style.animation = 'none';
    panel.offsetHeight;
    panel.style.animation = '';
  }
};

buildAreaDropdown();
buildTagDropdown();
renderList();
openDetail('TC-001');
</script>

</body>
</html>
