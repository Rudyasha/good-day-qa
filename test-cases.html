let activeArea = 'all';
let activeCase = null;

function escHtml(value) {
  return value.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function tag(area) {
  return `<span class="area-tag area-${areaColors[area] || 'blue'}">${escHtml(area)}</span>`;
}

function renderCommonPreconditions() {
  document.getElementById('common-preconditions').innerHTML = commonPreconditions.map(item =>
    `<li>${escHtml(item)}</li>`).join('');
}

function buildAreaDropdown() {
  const counts = {};
  cases.forEach(tc => { counts[tc.area] = (counts[tc.area] || 0) + 1; });
  const select = document.getElementById('area-filter');
  Object.keys(counts).sort().forEach(area => {
    const option = document.createElement('option');
    option.value = area;
    option.textContent = area.toUpperCase() + ' (' + counts[area] + ')';
    select.appendChild(option);
  });
}

function applyFilters() {
  activeArea = document.getElementById('area-filter').value;
  renderList();
}

function renderList() {
  const filtered = activeArea === 'all' ? cases : cases.filter(tc => tc.area === activeArea);
  document.getElementById('count-label').textContent = filtered.length + ' / ' + cases.length;
  let lastArea = '';
  const html = filtered.map(tc => {
    const heading = tc.area !== lastArea ? `<div class="list-cat-label">${escHtml(tc.area)}</div>` : '';
    lastArea = tc.area;
    return `${heading}
      <article class="tc-item${activeCase === tc.id ? ' active' : ''}" id="item-${tc.id}" onclick="openDetail('${tc.id}')">
        <div class="tc-item-row1">
          <span class="tc-item-id">${tc.id}</span>
          <span class="tc-item-title">${escHtml(tc.title)}</span>
        </div>
        <div class="tc-item-badges">${tag(tc.area)}</div>
      </article>`;
  }).join('');
  document.getElementById('list-scroll').innerHTML = html || '<div class="empty-filter">NO CASES MATCH FILTER</div>';
}

function listBlock(items, cssClass) {
  return `<ol class="${cssClass}">${items.map((item, index) =>
    `<li class="detail-step"><span class="step-num">${String(index + 1).padStart(2, '0')}.</span><span class="step-text">${escHtml(item)}</span></li>`
  ).join('')}</ol>`;
}

function openDetail(id) {
  const tc = cases.find(item => item.id === id);
  if (!tc) return;
  activeCase = id;
  renderList();
  const active = document.getElementById('item-' + id);
  if (active) active.scrollIntoView({block: 'nearest'});

  document.getElementById('detail-empty').style.display = 'none';
  const content = document.getElementById('detail-content');
  content.style.display = 'block';
  const notes = tc.notes ? `
    <div class="detail-divider"></div>
    <div class="detail-section-label">Notes</div>
    <div class="detail-notes">${escHtml(tc.notes)}</div>` : '';
  content.innerHTML = `
    <div class="detail-tc-meta"><span class="detail-tc-id">${tc.id}</span>${tag(tc.area)}</div>
    <h1 class="detail-title">${escHtml(tc.title)}</h1>
    <div class="detail-divider"></div>
    <div class="detail-section-label">Case Data / Variation</div>
    <div class="detail-variation">${escHtml(tc.variation)}</div>
    <div class="detail-divider"></div>
    <div class="detail-section-label">Steps</div>
    ${listBlock(tc.steps, 'detail-steps')}
    <div class="detail-divider"></div>
    <div class="detail-section-label">Expected Result</div>
    ${listBlock(tc.expected, 'detail-results')}
    ${notes}`;
}

renderCommonPreconditions();
buildAreaDropdown();
renderList();
openDetail('TC-001');
</script>
</body>
</html>
