let currentType = 'all';
let currentArea = 'all';
let selectedId  = null;

function buildAreaFilter() {
  const areas = [...new Set(cases.map(c => c.area))];
  const sel = document.getElementById('area-filter');
  areas.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    sel.appendChild(opt);
  });
}

function filteredCases() {
  return cases.filter(c => {
    if (currentType !== 'all' && c.type !== currentType) return false;
    if (currentArea !== 'all' && c.area !== currentArea) return false;
    return true;
  });
}

function setType(t) {
  currentType = t;
  ['chip-all','chip-positive','chip-negative'].forEach(id =>
    document.getElementById(id).classList.remove('active')
  );
  document.getElementById({all:'chip-all',positive:'chip-positive',negative:'chip-negative'}[t]).classList.add('active');
  applyFilters();
}

function applyFilters() {
  currentArea = document.getElementById('area-filter').value;
  renderList();
}

function renderList() {
  const fc = filteredCases();
  document.getElementById('count-label').textContent = fc.length + ' / ' + cases.length;
  const container = document.getElementById('list-scroll');
  container.innerHTML = '';
  let lastArea = null;
  fc.forEach(c => {
    if (c.area !== lastArea) {
      const lbl = document.createElement('div');
      lbl.className = 'list-cat-label';
      lbl.textContent = c.area.toUpperCase();
      container.appendChild(lbl);
      lastArea = c.area;
    }
    const item = document.createElement('div');
    item.className = 'tc-item' + (selectedId === c.id ? ' active' : '');
    item.onclick = () => openDetail(c.id);
    const typeCls = c.type === 'positive' ? 'scenario-pos' : 'scenario-neg';
    const typeLabel = c.type === 'positive' ? '+' : '−';
    item.innerHTML = `
      <div class="tc-item-row1">
        <span class="tc-item-id">${c.id}</span>
        <span class="scenario-tag ${typeCls}">${typeLabel}</span>
        <span class="tc-item-title">${c.title}<\/span>
      <\/div>
      <div style="margin-top:4px;padding-left:2px;">
        <span class="area-tag" style="font-size:8px;letter-spacing:.1em;opacity:.7;">${c.area}<\/span>
      <\/div>
    `;
    container.appendChild(item);
  });
  if (fc.length === 0) {
    container.innerHTML = '<div style="padding:24px;color:var(--text-dim);font-family:Share Tech Mono,monospace;font-size:10px;letter-spacing:.12em">NO CASES MATCH</div>';
  }
}

function secLabel(txt) {
  return `<div class="detail-section-label">${txt}<\/div>`;
}

function numList(items, cls) {
  if (!items || !items.length) return '';
  const rows = items.map((s,i) => `
    <div class="detail-step">
      <span class="step-mark"><\/span>
      <span class="step-text">${s}<\/span>
    <\/div>`).join('');
  return `<div class="${cls}">${rows}<\/div>`;
}

function openDetail(id) {
  selectedId = id;
  const c = cases.find(x => x.id === id);
  if (!c) return;
  document.querySelectorAll('.tc-item').forEach(el => el.classList.remove('active'));
  const el = [...document.querySelectorAll('.tc-item')].find(el =>
    el.querySelector('.tc-item-id')?.textContent === id
  );
  if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest' }); }

  document.getElementById('detail-empty').style.display = 'none';
  const content = document.getElementById('detail-content');
  content.style.display = 'block';

  const typeCls = c.type === 'positive' ? 'scenario-pos' : 'scenario-neg';
  const typeLabel = c.type === 'positive' ? '+ POSITIVE' : '− NEGATIVE';
  const expCls = c.type === 'negative'
    ? 'detail-results detail-results-err'
    : 'detail-results';

  let html = `
    <div class="detail-tc-meta">
      <span class="scenario-tag ${typeCls}">${typeLabel}<\/span>
      <span class="area-tag">${c.area}<\/span>
    <\/div>
    <div class="detail-tc-id">${c.id}<\/div>
    <div class="detail-title">${c.title}<\/div>
  `;

  if (c.preconditions?.length) {
    html += secLabel('Preconditions');
    html += `<div class="detail-steps">${c.preconditions.map(p =>
      `<div class="detail-step"><span class="step-mark"><\/span><span class="step-text">${p}<\/span><\/div>`
    ).join('')}<\/div>`;
  }

  if (c.testData) {
    html += secLabel('Test Data');
    html += `<div class="detail-variation">${c.testData.replace(/\\n/g,'<br>')}<\/div>`;
  }

  html += secLabel('Steps');
  html += numList(c.steps, 'detail-steps');

  html += secLabel('Expected Result');
  html += numList(c.expected, expCls);

  if (c.notes) {
    html += secLabel('Notes');
    html += `<div class="detail-notes">${c.notes}<\/div>`;
  }

  content.innerHTML = html;
  document.getElementById('detail-panel').scrollTop = 0;
}

buildAreaFilter();
renderList();
