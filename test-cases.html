  const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';

/* ── Filters ── */
let activePri = 'all';
let activeArea = 'all';

function setPri(pri, btn) {
  activePri = pri;
  document.querySelectorAll('.pri-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  activeArea = document.getElementById('area-filter').value;
  renderList();
}

function buildAreaDropdown() {
  const sel = document.getElementById('area-filter');
  const counts = {};
  cases.forEach(c => { counts[c.area] = (counts[c.area] || 0) + 1; });
  Object.keys(areasMeta).forEach(key => {
    if (!counts[key]) return;
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = areasMeta[key].label.toUpperCase() + ' (' + counts[key] + ')';
    sel.appendChild(opt);
  });
}

function renderList() {
  let filtered = cases;
  if (activeArea !== 'all') filtered = filtered.filter(c => c.area === activeArea);
  if (activePri !== 'all') filtered = filtered.filter(c => c.pri === activePri);

  document.getElementById('count-label').textContent = filtered.length + ' / ' + cases.length;

  let html = '';
  let lastArea = '';
  filtered.forEach(tc => {
    const am = areasMeta[tc.area];
    if (tc.area !== lastArea) {
      lastArea = tc.area;
      html += `<div class="list-cat-label">${am.label.toUpperCase()}</div>`;
    }
    const priB = `<span class="badge badge-${tc.pri}">${tc.pri.toUpperCase()}</span>`;
    const areaB = `<span class="area-tag area-${am.color}">${am.label}</span>`;
    html += `
      <div class="tc-item" id="item-${tc.id}" onclick="openDetail('${tc.id}')">
        <div class="tc-item-row1">
          <span class="tc-item-id">${tc.id}</span>
          <span class="tc-item-title">${tc.title}</span>
        </div>
        <div class="tc-item-badges">${priB}${areaB}</div>
      </div>`;
  });
  if (!html) {
    html = '<div style="padding:24px 16px;font-family:\'Share Tech Mono\',monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.1em;">NO CASES MATCH FILTER</div>';
  }
  document.getElementById('list-scroll').innerHTML = html;
}

function openDetail(id) {
  const tc = cases.find(c => c.id === id);
  if (!tc) return;

  document.querySelectorAll('.tc-item').forEach(i => i.classList.remove('active'));
  const el = document.getElementById('item-' + id);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest' }); }

  document.getElementById('detail-empty').style.display = 'none';
  const content = document.getElementById('detail-content');
  content.style.display = 'block';

  const am = areasMeta[tc.area];
  const areaTag  = `<span class="area-tag area-${am.color}">${am.label}</span>`;
  const priB     = `<span class="badge badge-${tc.pri}">${tc.pri.toUpperCase()}</span>`;
  const autoLabel = tc.auto === 'h' ? 'HIGH' : tc.auto === 'm' ? 'MEDIUM' : 'LOW';
  const autoB    = `<span class="badge badge-auto-${tc.auto}">AUTO: ${autoLabel}</span>`;

  const stepsHtml = tc.steps.map((s, i) => `
    <li class="detail-step">
      <span class="step-num">${String(i+1).padStart(2,'0')}.</span>
      <span class="step-text">${escHtml(s)}</span>
    </li>`).join('');

  const gapNote = tc.gap
    ? `<div class="detail-gap-ref">→ See <a href="gaps.html" style="color:var(--yellow);text-decoration:none;">${tc.gap}</a> in Spec Gaps</div>`
    : '';

  content.innerHTML = `
    <div class="detail-tc-meta">
      <span class="detail-tc-id">${tc.id}</span>
      ${priB}${areaTag}${autoB}
    </div>
    <div class="detail-title">${tc.title}</div>
    <div class="detail-divider"></div>

    <div class="detail-section-label">Preconditions</div>
    <div class="detail-preconditions">${escHtml(tc.pre)}</div>

    <div class="detail-divider"></div>
    <div class="detail-section-label">Test Steps</div>
    <ol class="detail-steps">${stepsHtml}</ol>

    <div class="detail-divider"></div>
    <div class="detail-section-label">Expected Result</div>
    <div class="detail-expected expected-${tc.expType}">${escHtml(tc.exp)}</div>
    ${gapNote}
  `;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

buildAreaDropdown();
renderList();
</script>
</body>
</html>
