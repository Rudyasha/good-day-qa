}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('eva-theme', next);
  updateThemeBtn();
}

/* ── Render list ── */
const catOrder = ['positive','negative','balance','edge'];
const catLabels = { positive:'POSITIVE — HAPPY PATH', negative:'NEGATIVE — REQUIRED FIELDS', balance:'NEGATIVE — BALANCE', edge:'EDGE CASES' };
let activeFilter = 'all';

function filterList(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.list-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const el = document.getElementById('list-scroll');
  const filtered = activeFilter === 'all' ? cases : cases.filter(c => c.cat === activeFilter);
  let html = '';
  let lastCat = '';
  filtered.forEach(tc => {
    if (activeFilter === 'all' && tc.cat !== lastCat) {
      lastCat = tc.cat;
      html += `<div class="list-cat-label">${catLabels[tc.cat]}</div>`;
    }
    const priBadge = `<span class="badge badge-${tc.pri}">${tc.priLabel}</span>`;
    const catBadge = `<span class="badge badge-${tc.cat}">${tc.catLabel}</span>`;
    html += `
      <div class="tc-item" id="item-${tc.id}" onclick="openDetail('${tc.id}')">
        <div class="tc-item-row1">
          <span class="tc-item-id">${tc.id}</span>
          <span class="tc-item-title">${tc.title}</span>
        </div>
        <div class="tc-item-badges">${catBadge}${priBadge}</div>
      </div>`;
  });
  el.innerHTML = html;
}

/* ── Open detail ── */
function openDetail(id) {
  const tc = cases.find(c => c.id === id);
  if (!tc) return;

  // Highlight selected item
  document.querySelectorAll('.tc-item').forEach(i => i.classList.remove('active'));
  const el = document.getElementById('item-' + id);
  if (el) el.classList.add('active');

  document.getElementById('detail-empty').style.display = 'none';
  const content = document.getElementById('detail-content');
  content.style.display = 'block';

  const catBadge = `<span class="badge badge-${tc.cat}">${tc.catLabel}</span>`;
  const priBadge = `<span class="badge badge-${tc.pri}">${tc.priLabel}</span>`;

  const stepsHtml = tc.steps.map((s, i) => `
    <li class="detail-step">
      <span class="step-num">${String(i+1).padStart(2,'0')}.</span>
      <span class="step-text">${escHtml(s)}</span>
    </li>`).join('');

  const gapNote = tc.gap
    ? `<div class="detail-gap-ref">→ See <a href="gaps.html" style="color:var(--yellow);text-decoration:none;">${tc.gap}</a> in Spec Gaps</div>`
    : '';

  content.innerHTML = `
    <div class="detail-tc-meta">
      <span class="detail-tc-id">${tc.id}</span>
      ${catBadge}${priBadge}
    </div>
    <div class="detail-title">${tc.title}</div>
    <div class="detail-divider"></div>

    <div class="detail-section-label">Preconditions</div>
    <div class="detail-preconditions">${escHtml(tc.pre)}</div>

    <div class="detail-divider"></div>
    <div class="detail-section-label">Test Steps</div>
    <ol class="detail-steps">${stepsHtml}</ol>

    <div class="detail-divider"></div>
    <div class="detail-section-label">Expected Result</div>
    <div class="detail-expected expected-${tc.expType}">${escHtml(tc.exp)}</div>
    ${gapNote}
  `;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderList();
